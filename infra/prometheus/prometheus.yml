# P3-13: Prometheus 抓取配置
# 适用于 docker-compose 环境

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则文件（P3-16 定义）
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Alertmanager 对接
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# 抓取目标
scrape_configs:
  # ── Prometheus 自身 ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── OpenSlin API ──
  - job_name: "openslin-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:3001"]
        labels:
          service: "openslin-api"
          component: "api"
          env: "dev"
    # API 需要认证，开发环境跳过
    # bearer_token: "<your-token>"

  # ── OpenSlin API Agent 指标（复用同一端点，添加 agent 组件标签） ──
  - job_name: "openslin-api-agent"
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:3001"]
        labels:
          service: "openslin-api"
          component: "agent"
          env: "dev"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "agent_.*"
        action: keep

  # ── OpenSlin Worker ──
  - job_name: "openslin-worker"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:3002"]
        labels:
          service: "openslin-worker"
          env: "dev"

  # ── OpenSlin Runner ──
  - job_name: "openslin-runner"
    metrics_path: "/v1/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:3003"]
        labels:
          service: "openslin-runner"
          env: "dev"

  # ── Node Exporter（可选） ──
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── PostgreSQL Exporter（可选） ──
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ── Redis Exporter（可选） ──
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
